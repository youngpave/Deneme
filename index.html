<video id="video" controls playsinline></video>

<div id="list">

    <div class="ch" onclick="load('proxy.php?url=' + encodeURIComponent('http://hayattv.pepbox.xyz:2095/live/smm0917tv2/smm1801zz00bb99/32770.m3u8'))">TABİİ SPOR 7</div>
</div>

<script>
    var video = document.getElementById('video');
    function load(url) {
        if (Hls.isSupported()) {
            var hls = new Hls({
                xhrSetup: function(xhr) { xhr.withCredentials = false; }
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
</script>
