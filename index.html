<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --blue: #2563eb; --card: #121620; }
        
        body { 
            background: var(--bg); color: white; margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow-x: hidden;
        }

        /* Üst Kontrol Çubuğu (Tam Ekran Butonunun Olduğu Yer) */
        #top-header {
            width: 100%;
            height: 60px;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            z-index: 9999;
            border-bottom: 2px solid var(--blue);
        }

        .fs-button {
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Oynatıcı Alanı */
        #main-player-container {
            width: 100%;
            position: fixed;
            top: 60px; /* Header'ın hemen altı */
            left: 0;
            z-index: 1000;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        .video-js, iframe { width: 100% !important; height: 100% !important; border: none; }

        /* Kanal Listesi */
        .content-area { 
            margin-top: calc(56.25vw + 80px); 
            padding: 15px; 
        }

        .channel-item { 
            background: var(--card); 
            padding: 18px; 
            margin-bottom: 12px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .channel-name { font-weight: 700; font-size: 16px; color: #fff; }
        .play-icon { color: var(--blue); font-size: 20px; }

        /* Tam Ekran Modu (Tüm cihazlar için zorlama) */
        #main-player-container:fullscreen { width: 100vw; height: 100vh; top: 0; }
