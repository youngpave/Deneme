<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAÇTV Genel Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #05070a; color: white; margin: 0; font-family: sans-serif; }
        
        /* HER YERDE GÖRÜNEN SABİT ÜST BAR */
        .header-bar {
            background: #121620;
            padding: 10px;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #2563eb;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .fs-button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        /* OYNATICI ALANI */
        #player-container {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        /* Tam Ekran Modu İçin Özel Ayar */
        #player-container:fullscreen { width: 100vw; height: 100vh; }
        #player-container:-webkit-full-screen { width: 100vw; height: 100vh; }

        .video-js, iframe { width: 100% !important; height: 100% !important; border: none; }

        /* KANAL LİSTESİ */
        .list-container { padding: 20px; }
        .channel-card {
            background: #1a1f2e;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #2d3748;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <button class="fs-button" onclick="tamEkranYap()">⛶ EKRANI KAPLA (REKLAMSIZ)</button>
    </div>

    <div id="player-container">
        <video id="main-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
        <iframe id="main-iframe" style="display:none;" allowfullscreen></iframe>
    </div>

    <div class="list-container" id="kanal-liste">
        </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('main-video');
        const iframe = document.getElementById('main-iframe');
        const videoTag = document.getElementById('main-video');
        const container = document.getElementById('player-container');

        // GENEL TAM EKRAN FONKSİYONU
        function tamEkranYap() {
            if (container.requestFullscreen) { container.requestFullscreen(); }
            else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); } // Safari
            else if (container.mozRequestFullScreen) { container.mozRequestFullScreen(); } // Firefox
            else if (container.msRequestFullscreen) { container.msRequestFullscreen(); } // IE
        }

        // KANAL VERİLERİ
        const kanallar = [
            {ad: "TRT SPOR", url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8", m3u8: true},
            {ad: "TV 8.5", url: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8", m3u8: true},
            {ad: "UFC YAYIN", url: "https://trendy47.dad/event/live-event_ufc-327-prochazka-vs-ulberg-live-stream", m3u8: false},
            {ad: "BEIN 1", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebs1.m3u8", m3u8: true}
        ];

        function kanalAc(url, isM3u8) {
            window.scrollTo(0, 0);
            if (isM3u8) {
                iframe.style.display = "none";
                videoTag.style.display = "block";
                player.src({ src: url, type: 'application/x-mpegURL' });
                player.play();
            } else {
                player.pause();
                videoTag.style.display = "none";
                iframe.style.display = "block";
                iframe.src = url;
            }
        }

        // Listeyi Oluştur
        const liste = document.getElementById('kanal-liste');
        kanallar.forEach(k => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => kanalAc(k.url, k.m3u8);
            card.innerHTML = `<span>${k.ad}</span> <b>OYNAT ▶</b>`;
            liste.appendChild(card);
        });
    </script>
</body>
</html>
