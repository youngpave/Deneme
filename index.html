<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #0b0e14; --card: #1a1f2b; --blue: #2563eb; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        #player-wrapper { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            position: sticky; 
            top: 0; 
            z-index: 999; 
            border-bottom: 2px solid var(--blue);
        }

        .video-js { width: 100% !important; height: 100% !important; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .ch-item { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .ch-item:active { transform: scale(0.98); background: #242b3d; }

        .ch-icon { 
            width: 40px; height: 40px; 
            background: var(--blue); 
            border-radius: 8px; 
            margin-right: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold;
        }

        .ch-info { flex: 1; }
        .ch-title { font-size: 16px; font-weight: bold; display: block; }
        .ch-status { font-size: 11px; color: #10b981; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="container">
        <div id="channels">
            </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // Android ve iPhone uyumlu player ayarları
        var player = videojs('main-player', {
            fluid: true,
            autoplay: false,
            liveui: true,
            html5: {
                vhs: { 
                    overrideNative: true,
                    allowSeeksWithinUnsafeLiveWindow: true 
                }
            }
        });

        const kanalListesi = [
            { 
                ad: "TRT SPOR (TEST)", 
                url: "proxy.php?url=" + encodeURIComponent("https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8") 
            },
            { 
                ad: "TABİİ SPOR 7 (VIP)", 
                url: "proxy.php?url=" + encodeURIComponent("http://hayattv.pepbox.xyz:2095/live/smm0917tv2/smm1801zz00bb99/32770.m3u8") 
            }
        ];

        function yayiniBaslat(link) {
            console.log("Bağlanıyor: " + link);
            player.src({ 
                src: link, 
                type: 'application/x-mpegURL' 
            });
            
            player.ready(function() {
                var playPromise = player.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function(error) {
                        // Android Chrome otomatik oynatma engeli çözümü
                        player.muted(true);
                        player.play();
                    });
                }
            });
        }

        const listeDiv = document.getElementById('channels');
        kanalListesi.forEach(kanal => {
            const div = document.createElement('div');
            div.className = 'ch-item';
            div.onclick = () => yayiniBaslat(kanal.url);
            div.innerHTML = `
                <div class="ch-icon">TV</div>
                <div class="ch-info">
                    <span class="ch-title">${kanal.ad}</span>
                    <span class="ch-status">● YAYIN HAZIR</span>
                </div>
            `;
            listeDiv.appendChild(div);
        });
    </script>
</body>
</html>
