<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #0b0e14; --card: #1a1f2b; --blue: #2563eb; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        #player-container { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 2px solid var(--blue);
        }

        .video-js { width: 100% !important; height: 100% !important; }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        .ch-card { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }

        .ch-card:active { transform: scale(0.97); background: #242b3d; }

        .icon { 
            width: 45px; height: 45px; 
            background: linear-gradient(135deg, var(--blue), #1d4ed8); 
            border-radius: 10px; 
            margin-right: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 12px;
        }

        .info { flex: 1; }
        .title { display: block; font-size: 16px; font-weight: 600; }
        .status { font-size: 10px; color: #10b981; text-transform: uppercase; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="container" id="channel-list">
        </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // Player'ı başlatırken hata vermemesi için ayarlar
        const player = videojs('my-video', {
            fluid: true,
            html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
        });

        const channels = [
            { 
                name: "TRT SPOR (TEST)", 
                url: "proxy.php?url=" + encodeURIComponent("https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8") 
            },
            { 
                name: "TABİİ SPOR 7 (VIP)", 
                url: "proxy.php?url=" + encodeURIComponent("http://tv34.co:8080/live/bhs007/9wWmCSGM/447239.m3u8") 
            }
        ];

        function playChannel(url) {
            console.log("Oynatılıyor: ", url);
            player.src({ 
                src: url, 
                type: 'application/x-mpegURL',
                withCredentials: false 
            });
            
            player.ready(function() {
                player.play().catch(function(error) {
                    console.log("Otomatik oynatma engellendi, ses kısılıyor...");
                    player.muted(true);
                    player.play();
                });
            });
        }

        const listDiv = document.getElementById('channel-list');
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.onclick = () => playChannel(ch.url);
            card.innerHTML = `
                <div class="icon">${ch.name.substring(0,3)}</div>
                <div class="info">
                    <span class="title">${ch.name}</span>
                    <span class="status">● ÇEVRİMİÇİ</span>
                </div>
            `;
            listDiv.appendChild(card);
        });
    </script>
</body>
</html>
