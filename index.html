<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --blue: #2563eb; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--blue); }
        .video-js { width: 100% !important; height: 100% !important; }
        .container { padding: 15px; }
        .ch-card { background: #121620; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; border: 1px solid #1e293b; }
        .icon { width: 40px; height: 40px; background: var(--blue); border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="container" id="list"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('my-video', {
            html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
        });

        const channels = [
            { name: "TRT SPOR (TEST)", url: "proxy.php?url=" + encodeURIComponent("https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8") },
            { name: "TABİİ SPOR 7", url: "proxy.php?url=" + encodeURIComponent("http://hayattv.pepbox.xyz:2095/live/smm0917tv2/smm1801zz00bb99/32770.m3u8") }
        ];

        function play(url) {
            player.src({ src: url, type: 'application/x-mpegURL', withCredentials: false });
            player.play().catch(() => {
                player.muted(true);
                player.play();
            });
        }

        const list = document.getElementById('list');
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-card';
            div.onclick = () => play(ch.url);
            div.innerHTML = `<div class="icon">TV</div><div>${ch.name}</div>`;
            list.appendChild(div);
        });
    </script>
</body>
</html>
